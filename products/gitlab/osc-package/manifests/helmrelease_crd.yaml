apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: helmreleases.osc.huaweicloud.com
spec:
  group: osc.huaweicloud.com
  names:
    kind: HelmRelease
    listKind: HelmReleaseList
    plural: helmreleases
    singular: helmrelease
  scope: Namespaced
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                chartName:
                  type: string
                  title: Chart Name
                chartVersion:
                  type: string
                  title: Chart Version
                values:
                  type: object
                  title: 部署参数
                  properties:
                    global:
                      type: object
                      title: 全局
                      properties:
                        imageRegistry:
                          type: string
                          title: 镜像仓库
                          default: swr.cn-east-2.myhuaweicloud.com/dx_x2era
                        namespace:
                          type: string
                          title: 命名空间
                          default: gitlab
                    images:
                      type: object
                      title: 镜像
                      properties:
                        gitlab:
                          type: string
                          title: GitLab 版本
                          default: gitlab-ce:17.3.0-ce.0
                        pullPolicy:
                          type: string
                          title: 拉取策略
                          default: IfNotPresent
                    swr:
                      type: object
                      title: SWR 凭证
                      properties:
                        username:
                          type: string
                          title: 用户名
                        password:
                          type: string
                          title: 密码
                    admin:
                      type: object
                      title: 管理员
                      properties:
                        password:
                          type: string
                          title: 密码
                        email:
                          type: string
                          title: 邮箱
                          default: admin@example.com
                    domain:
                      type: string
                      title: 域名
                      default: gitlab.example.com
                    service:
                      type: object
                      title: 服务
                      properties:
                        type:
                          type: string
                          title: 类型
                          default: LoadBalancer
                    storage:
                      type: object
                      title: 存储
                      properties:
                        data:
                          type: object
                          title: 仓库数据
                          properties:
                            size:
                              type: string
                              title: 大小
                              default: 50Gi
                            storageClass:
                              type: string
                              title: 存储类
                              default: csi-disk
                        config:
                          type: object
                          title: 配置
                          properties:
                            size:
                              type: string
                              title: 大小
                              default: 10Gi
                            storageClass:
                              type: string
                              title: 存储类
                              default: csi-disk
                        logs:
                          type: object
                          title: 日志
                          properties:
                            size:
                              type: string
                              title: 大小
                              default: 10Gi
                            storageClass:
                              type: string
                              title: 存储类
                              default: csi-disk
                    resources:
                      type: object
                      title: 资源
                      properties:
                        requests:
                          type: object
                          title: 请求
                          properties:
                            cpu:
                              type: string
                              title: CPU
                              default: "2"
                            memory:
                              type: string
                              title: 内存
                              default: 4Gi
                    replicas:
                      type: integer
                      title: 副本数
                      default: 1
