apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitlab
  namespace: {{ .Values.global.namespace }}
  labels:
    app: gitlab
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app: gitlab
  template:
    metadata:
      labels:
        app: gitlab
    spec:
      {{- if and .Values.swr.username .Values.swr.password }}
      imagePullSecrets:
        - name: swr-secret
      {{- end }}
      containers:
        - name: gitlab
          image: {{ include "gitlab.image" . }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          ports:
            - containerPort: 80
              name: http
            - containerPort: 443
              name: https
            - containerPort: 22
              name: ssh
          env:
            - name: GITLAB_OMNIBUS_CONFIG
              value: |
                external_url 'http://{{ .Values.domain }}'
                gitlab_rails['initial_root_password'] = File.read('/etc/gitlab-admin-password/password').strip
                {{- if .Values.smtp.enabled }}
                gitlab_rails['smtp_enable'] = true
                gitlab_rails['smtp_address'] = '{{ .Values.smtp.host }}'
                gitlab_rails['smtp_port'] = {{ .Values.smtp.port }}
                gitlab_rails['smtp_user_name'] = '{{ .Values.smtp.user }}'
                gitlab_rails['smtp_password'] = '{{ .Values.smtp.password }}'
                gitlab_rails['smtp_domain'] = '{{ .Values.smtp.domain }}'
                {{- end }}
            - name: GITLAB_ROOT_EMAIL
              value: {{ .Values.admin.email | quote }}
          volumeMounts:
            - name: gitlab-data
              mountPath: /var/opt/gitlab
            - name: gitlab-config
              mountPath: /etc/gitlab
            - name: gitlab-logs
              mountPath: /var/log/gitlab
            - name: admin-password
              mountPath: /etc/gitlab-admin-password
              readOnly: true
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu }}
              memory: {{ .Values.resources.requests.memory }}
          # livenessProbe temporarily disabled for initial setup
          # GitLab first boot takes 5-10 minutes due to reconfigure
          readinessProbe:
            httpGet:
              path: /users/sign_in
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 30
      volumes:
        - name: admin-password
          secret:
            secretName: gitlab-admin-password
        {{- range $name, $cfg := .Values.storage }}
        - name: gitlab-{{ $name }}
          persistentVolumeClaim:
            {{- if $cfg.existingClaim }}
            claimName: {{ $cfg.existingClaim }}
            {{- else }}
            claimName: gitlab-{{ $name }}
            {{- end }}
        {{- end }}
