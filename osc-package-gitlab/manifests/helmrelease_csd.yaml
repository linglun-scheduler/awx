apiVersion: osc.io/v1beta1
kind: CustomServiceDefinition
metadata:
  name: gitlab-csd
spec:
  CRDRef:
    apiVersion: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    metadata:
      name: helmreleases.osc.huaweicloud.com
  role: serviceEntity
  displayName: "GitLab CE"
  description: "GitLab Community Edition"
  serviceEntityDependencies: []
  defaultConfiguration: |-
    {
      "apiVersion": "osc.huaweicloud.com/v1",
      "kind": "HelmRelease",
      "metadata": {
        "name": "gitlab"
      },
      "spec": {
        "chartName": "gitlab",
        "chartVersion": "1.0.0",
        "values": {
          "global": {
            "imageRegistry": "swr.cn-east-2.myhuaweicloud.com/dx_x2era",
            "namespace": "gitlab"
          },
          "images": {
            "gitlab": "gitlab-ce:17.3.0-ce.0",
            "pullPolicy": "IfNotPresent"
          },
          "admin": {
            "password": "",
            "email": "admin@example.com"
          },
          "domain": "gitlab.example.com",
          "service": {
            "type": "LoadBalancer"
          },
          "storage": {
            "data": {
              "size": "50Gi",
              "storageClass": "csi-disk"
            },
            "config": {
              "size": "10Gi",
              "storageClass": "csi-disk"
            },
            "logs": {
              "size": "10Gi",
              "storageClass": "csi-disk"
            }
          },
          "resources": {
            "requests": {
              "cpu": "2",
              "memory": "4Gi"
            }
          },
          "replicas": 1
        }
      }
    }
